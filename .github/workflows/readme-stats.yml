name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create profile directory
        run: mkdir -p profile

      - name: Generate stats card
        run: |
          curl -s "https://github-readme-stats.vercel.app/api?username=lg-pereira&include_all_commits=true&count_private=true&show_icons=true&line_height=20&title_color=F6821F&icon_color=F6821F&text_color=D3D3D3&bg_color=0,0a0a0a,1a1a2e&border_radius=10" \
            -o profile/stats.svg

      - name: Generate top languages card
        run: |
          curl -s "https://github-readme-stats.vercel.app/api/top-langs/?username=lg-pereira&layout=compact&text_color=daf7dc&bg_color=151515&border_radius=10" \
            -o profile/top-langs.svg

      - name: Generate streak card
        run: |
          curl -s "https://streak-stats.demolab.com?user=lg-pereira&theme=dark&background=0a0a0a&border=F6821F&stroke=F6821F&ring=F6821F&fire=F6821F&currStreakNum=FFFFFF&sideNums=FFFFFF&currStreakLabel=F6821F&sideLabels=F6821F&dates=888888&border_radius=10" \
            -o profile/streak.svg

      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || echo "No changes to commit"
          git push origin HEAD
